name: Build AI Engine

on:
  push:
    branches: [main]
    paths:
      - 'engine/**'
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            platform: darwin
            arch: arm64
          - os: windows-latest
            platform: win32
            arch: x64
          - os: ubuntu-latest
            platform: linux
            arch: x64

    runs-on: ${{ matrix.os }}
    name: Build ${{ matrix.platform }}-${{ matrix.arch }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Linux needs libsndfile for soundfile/librosa
      - name: Install system dependencies (Linux)
        if: matrix.platform == 'linux'
        run: sudo apt-get update && sudo apt-get install -y libsndfile1

      - name: Install Python dependencies
        run: pip install --pre -r engine/requirements.txt

      # Essentia bundles libSDL which crashes in headless PyInstaller builds.
      # Replace it with a stub that satisfies the linker without initializing SDL.
      - name: Create SDL stub (macOS)
        if: matrix.platform == 'darwin'
        run: |
          DYLIBS_DIR=$(python -c "import essentia, os; print(os.path.join(os.path.dirname(essentia.__file__), '.dylibs'))")
          echo "void SDL_Init(void) {} void SDL_Quit(void) {}" > /tmp/sdl_stub.c
          cc -shared -o "$DYLIBS_DIR/libSDL-1.2.0.dylib" /tmp/sdl_stub.c -install_name @loader_path/libSDL-1.2.0.dylib

      - name: Create SDL stub (Linux)
        if: matrix.platform == 'linux'
        run: |
          LIBS_DIR=$(python -c "import essentia, os; print(os.path.join(os.path.dirname(essentia.__file__), '.libs'))" 2>/dev/null || echo "")
          if [ -n "$LIBS_DIR" ] && [ -d "$LIBS_DIR" ]; then
            SDL_FILE=$(find "$LIBS_DIR" -name "libSDL*" -print -quit 2>/dev/null || true)
            if [ -n "$SDL_FILE" ]; then
              echo "void SDL_Init(void) {} void SDL_Quit(void) {}" > /tmp/sdl_stub.c
              gcc -shared -o "$SDL_FILE" /tmp/sdl_stub.c
            fi
          fi

      - name: Determine binary name
        id: name
        shell: bash
        run: |
          EXT=""
          if [ "$PLATFORM" = "win32" ]; then
            EXT=".exe"
          fi
          echo "binary_name=spintools-ai-${PLATFORM}-${ARCH}${EXT}" >> "$GITHUB_OUTPUT"
        env:
          PLATFORM: ${{ matrix.platform }}
          ARCH: ${{ matrix.arch }}

      - name: Build with PyInstaller
        shell: bash
        run: |
          cd engine
          pyinstaller \
            --onefile \
            --name "$BINARY_NAME" \
            --hidden-import essentia \
            --hidden-import essentia.standard \
            --distpath dist \
            --workpath build \
            --specpath build \
            --clean \
            --noconfirm \
            spintools_ai.py
        env:
          BINARY_NAME: ${{ steps.name.outputs.binary_name }}

      - name: Test binary starts
        shell: bash
        run: |
          BINARY="engine/dist/$BINARY_NAME"
          chmod +x "$BINARY" 2>/dev/null || true
          echo "QUIT" | "$BINARY" --server || true
          echo "Binary test passed"
        env:
          BINARY_NAME: ${{ steps.name.outputs.binary_name }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.name.outputs.binary_name }}
          path: engine/dist/${{ steps.name.outputs.binary_name }}

  release:
    needs: build
    runs-on: ubuntu-latest
    name: Upload engine binaries to v1 release

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f

      - name: Upload binaries to v1 release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Upload all platform binaries to the existing v1 release
          for dir in artifacts/*/; do
            for file in "$dir"*; do
              echo "Uploading: $file"
              gh release upload v1 "$file" --repo "$GITHUB_REPOSITORY" --clobber
            done
          done
