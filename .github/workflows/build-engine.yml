name: Build AI Engine

on:
  push:
    branches: [main]
    paths:
      - 'engine/**'
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag to upload assets to (e.g., engine-v1)'
        required: false

jobs:
  # Determine the release tag — auto-increment from existing tags or use manual input
  prepare:
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine release tag
        id: tag
        env:
          INPUT_TAG: ${{ github.event.inputs.release_tag }}
        shell: bash
        run: |
          if [ -n "$INPUT_TAG" ]; then
            echo "tag=$INPUT_TAG" >> "$GITHUB_OUTPUT"
          else
            # Find latest engine-vN tag and increment
            LATEST=$(git tag -l 'engine-v*' --sort=-v:refname | head -1)
            if [ -z "$LATEST" ]; then
              echo "tag=engine-v1" >> "$GITHUB_OUTPUT"
            else
              NUM="${LATEST#engine-v}"
              NEXT=$((NUM + 1))
              echo "tag=engine-v${NEXT}" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Print tag
        env:
          TAG: ${{ steps.tag.outputs.tag }}
        run: 'echo "Release tag: $TAG"'

  build:
    needs: prepare
    strategy:
      matrix:
        include:
          - os: macos-latest
            platform: darwin
            arch: arm64
          - os: macos-13
            platform: darwin
            arch: x64
          - os: windows-latest
            platform: win32
            arch: x64
          - os: ubuntu-latest
            platform: linux
            arch: x64

    runs-on: ${{ matrix.os }}
    name: Build ${{ matrix.platform }}-${{ matrix.arch }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Linux needs libsndfile for soundfile/librosa
      - name: Install system dependencies (Linux)
        if: matrix.platform == 'linux'
        run: sudo apt-get update && sudo apt-get install -y libsndfile1

      - name: Install Python dependencies
        run: pip install -r engine/requirements.txt

      - name: Determine binary name
        id: name
        shell: bash
        env:
          PLATFORM: ${{ matrix.platform }}
          ARCH: ${{ matrix.arch }}
        run: |
          EXT=""
          if [ "$PLATFORM" = "win32" ]; then
            EXT=".exe"
          fi
          echo "binary_name=spintools-ai-${PLATFORM}-${ARCH}${EXT}" >> "$GITHUB_OUTPUT"

      - name: Build with PyInstaller
        shell: bash
        env:
          BINARY_NAME: ${{ steps.name.outputs.binary_name }}
        run: |
          cd engine
          pyinstaller \
            --onefile \
            --name "$BINARY_NAME" \
            --distpath dist \
            --workpath build \
            --specpath build \
            --clean \
            --noconfirm \
            spintools_ai.py

      - name: Test binary starts
        shell: bash
        env:
          BINARY_NAME: ${{ steps.name.outputs.binary_name }}
        run: |
          BINARY="engine/dist/$BINARY_NAME"
          chmod +x "$BINARY" 2>/dev/null || true
          echo "QUIT" | "$BINARY" --server || true
          echo "Binary test passed"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.name.outputs.binary_name }}
          path: engine/dist/${{ steps.name.outputs.binary_name }}

  release:
    needs: [prepare, build]
    runs-on: ubuntu-latest
    name: Create release (${{ needs.prepare.outputs.release_tag }})

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f

      - name: Create release and upload binaries
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ needs.prepare.outputs.release_tag }}
        run: |
          # Create the release (or update if it exists)
          gh release create "$RELEASE_TAG" \
            --repo "${{ github.repository }}" \
            --title "AI Engine $RELEASE_TAG" \
            --notes "Automated build of the SpinTools AI Engine for all platforms." \
            --latest \
            2>/dev/null || true

          # Upload all platform binaries
          for dir in artifacts/*/; do
            for file in "$dir"*; do
              echo "Uploading: $file"
              gh release upload "$RELEASE_TAG" "$file" --repo "${{ github.repository }}" --clobber
            done
          done
